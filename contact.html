<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me</title>
</head>
<body>

    <h2>Get in Touch</h2>

    <!-- The <form> tag acts as a container for all inputs -->
    <form action="/submit-data" method="POST">
        
        <!-- Name Input -->
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="user_name" placeholder="Enter your name" required><br><br>

        <!-- Email Input -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="user_email" placeholder="Enter your email" required><br><br>

        <!-- Message Box -->
        <label for="message">Message:</label><br>
        <textarea id="message" name="user_message" rows="4" cols="30" placeholder="Type your message here..."></textarea><br><br>

        <!-- Submit Button -->
        <button type="submit">Send Message</button>
    </form>

</body>
</html>
